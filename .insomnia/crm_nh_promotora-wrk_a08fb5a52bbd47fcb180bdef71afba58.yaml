                  description: >-
                    ## Regras de negócio


                    Essa URL de paginação tem uma regra de negócio específica,
                    caso o usuário tiver a role `promotor` no sistema, os
                    resultados obtidos pela request nessa rota serão referentes
                    apenas às consultas do mesmo, caso a role do usuário for
                    `admin`, irá retornar todas as consultas sem excessão.


                    ## URL query params


                    Essa e outras rotas de consultas não recebem body, apenas
                    `query params`, são eles:


                    | **Query param** | **Valor** |

                    | --- | --- |

                    | pesquisa | Busca\\ por CPF |

                    | limite | Limite de propostas retornadas |

                    | pagina | Página em que a requisição se encontra (utilizada
                    no front principalmente) |

                    | elegivelOferta | True ou False, filtra os usuários com
                    ofertas disponíveis ou não |


                    Se a request for feita corretamente, será retornado algo
                    parecido com isso:


                    ``` json

                    {
                        "data": [
                            {
                                "id": 9,
                                "cpf": "99999999999",
                                "anuidades": [
                                    {
                                        "due_date": "2027-10-01",
                                        "total_amount": 125.39
