                meta:
                  id: req_2e37503336dd4ffab188e8426f3b575b
                  created: 1782742681248
                  modified: 1782828497584
                  isPrivate: false
                  description: >-
                    ## Objetivo do end-point


                    Esse end-point tem como principal objetivo funcionar em
                    conjunto com a tela de gerar proposta do front-end, onde o
                    end-point teria como função pesquisar os bancos que temos
                    cadastrados no banco de dados para facilitar na criação da
                    proposta.


                    ## Query params


                    Esse end point recebe dois query params opcionais:


                    | **Param** | **Função** |

                    | --- | --- |

                    | pesquisa | Busca o banco usando o nome como referência |

                    | limite | Define o limite de bancos retornados no body |


                    ## Retorno


                    Caso a request seja feita corretamente, irá ser retornado
                    `código 200 (OK)` e o seguinte body:


                    Exemplo, se o query param `pesquisa` for = `itau`:


                    ``` json

                    [
                        {
                            "id": 243,
                            "ISPB": "33885724",
                            "banco": "BANCO ITAÚ CONSIGNADO S.A.",
                            "num_cod": "029"
                        },
                        {
                            "id": 378,
                            "ISPB": "60394079",
                            "banco": "BCO ITAUBANK S.A.",
                            "num_cod": "479"
                        },
                        {
                            "id": 381,
                            "ISPB": "60701190",
                            "banco": "ITAÚ UNIBANCO S.A.",
                            "num_cod": "341"
                        }
                    ]

                     ```

                    Se não for encontrado nenhum banco com esse nome no banco de
                    dados, a API irá retornar `código 204 (no content)`.
