            children:
              - url: "{{baseURL}}/propostas/CLT"
                name: Envio de proposta CLT
                meta:
                  id: req_7f9254ce314647379926ae5e4ea4bd31
                  created: 1782742681251
                  modified: 1782829465272
                  isPrivate: false
                  description: |-
                    ## Sobre esse end-point

                    Esse end-point é usado em sequencia do "[Consultar Vinculo, margem e tabelas](https://gabbflor-7245779.postman.co/workspace/Gabb.Flor's-Workspace~4854f2ee-bb73-4c68-82d5-a1a16bf3e365/request/49809412-f17c1569-13bc-4cdf-af2f-5eef98d3f2c4?action=share&creator=49809412)", ele irá utilizar algumas informações do mesmo para gerar a proposta, enquanto o promotor deverá digitar outras.

                    ## Body

                    O body dessa requisição depende de qual instituição será usada para a operação, caso for o `"Nossa fintech"`:

                    ``` json
                    {
                        "instituicao": "Nossa fintech",
                        "cpf": "00000000000",
                        "simulacaoId": "",
                        "banco": "",
                        "cnpj_empregador": "",
                        "profissão": "",
                        "valor_parcelas": 0.0,
                        "taxa_aplicada": 0.0,
                        "pixKeyType": "cpf",
                        "pixKey": "00000000000"
                    }

                     ```

                    Mas caso for "v8", o body deverá ser da seguinte forma:

                    ``` json
                    {
                        "instituicao": "v8",
                        "pix_key_type": "cpf || chave_aleatoria || email || telefone",
                        "pix_key": "CPF_CLIENTE",
                        "cpf": "CPF_CLIENTE",
                        "sexo": "F",
                        "qtdParcelas": 36,
                        "valorParcelas": 999.99,
                        "tabelaId": "UUID TABELA",
                        "idTermo": "UUID TERMO DE AUTORIZACAO"
                    }

                     ```

                    Dessas informações, segue a tabela de quais deverão ser digitadas e quais deverão vir dos end-points passados:

                    | **Informação** | **Digitada?** |
                    | --- | --- |
                    | bankCode | sim |
                    | accountType | sim |
                    | accountNumber | sim |
