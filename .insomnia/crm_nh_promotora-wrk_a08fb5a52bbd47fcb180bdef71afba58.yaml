              - url: "{{baseURL}}/consultas/FGTS/lote"
                name: Consulta FGTS em lote
                meta:
                  id: req_b2d0f193e2df4d01bc3267c567c95ebb
                  created: 1782742681231
                  modified: 1782829732284
                  isPrivate: false
                  description: |-
                    ## Body

                    O body dessa requisição deve ser obrigatóriamente ser um form data e deve ser enviado dessa forma:

                    <img src="https://content.pstmn.io/bc9762c9-e841-4588-a3a9-1141e8430e9d/aW1hZ2UucG5n" width="570" height="179">

                    Segue o curl de exemplo (mandar para a IA se for preciso):

                    ``` bash
                    curl --location 'localhost:3000/consultas/FGTS/lote' \
                    --header 'Authorization: Bearer [SEU TOKEN DE USUARIO]' \
                    --form 'file=@"caminho/para/o/arquivo.csv"' \
                    --form 'id_promotor="2"' \
                    --form 'instituicao="VCTex"'

                     ```

                    ## Observação

                    No campo `--form 'id_promotor'` é onde fica o id do promotor que irá receber aquelas consultas, e essa consulta em lote que está sendo enviada ficará ligada com o id do usuário logado com o token em `Authorization: Bearer [SEU TOKEN DE USUARIO]`.

                    ## Retorno

                    Caso a consulta em lote for enviada corretamente, irá retornar `código 200` sem body, caso contrário, irá retornar o erro com o código indicando o problema.

                    ## Visualizar a consulta em lote

                    Para visualizar essa consulta em lote que foi enviada, deverá utilizar a rota [GET -&gt; Recuperar consultas em lote].
