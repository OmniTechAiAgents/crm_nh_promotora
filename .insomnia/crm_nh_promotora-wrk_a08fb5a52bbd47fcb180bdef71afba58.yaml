              - url: "{{baseURL}}/consultas/FGTS/lote/reatribuir"
                name: Reatribuir consulta em lote
                meta:
                  id: req_dc93861ec4634beea3710c58057ed4d1
                  created: 1782742681234
                  modified: 1782827277097
                  isPrivate: false
                  description: >-
                    ## Uso do end-point


                    Esse end point serve para reatribuir um lote de consultas
                    para um promotor em específico.


                    ## Body


                    O body dessa requisição deve conter:


                    ``` json

                    {
                        "id_consulta_lote": 1,
                        "id_novo_promotor": 1
                    }

                     ```

                    ## Retorno


                    Se a operação for concluída com sucesso e todos os dados
                    alterados corretamente, retornará `código 200` e o seguinte
                    body:


                    ``` json

                    {
                        "msg": "Todas as consultas em lote foram reatribuídas com sucesso."
                    }

                     ```

                    Se no body conter um id de consulta em lote inexistente,
                    retornará `erro 404` e a seguinte mensagem no body:


                    ``` json

                    {
                        "erro": "Não existe nenhuma consulta em lote com esse id"
                    }

                     ```

                    Se no body conter o id de um promotor inexistente, retornará
                    `erro 404` e a seguinte mensagem no body:


                    ``` json

                    {
                        "erro": "Não existe nenhum promotor com esse id."
                    }

                     ```
