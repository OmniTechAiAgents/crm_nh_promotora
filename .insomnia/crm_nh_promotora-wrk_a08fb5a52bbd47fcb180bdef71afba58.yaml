              - url: "{{baseURL}}/propostas/FGTS"
                name: Envio de propostas FGTS
                meta:
                  id: req_c312f514cf714d08b7c89468db2da68a
                  created: 1782742681249
                  modified: 1782828491991
                  isPrivate: false
                  description: >-
                    ## URL Query Params


                    Obrigatoriamente é necessário enviar o query param
                    "financialId" na URL da requisição, nesse query param deverá
                    conter o financialId que foi gerado anteriormente pela
                    request de simulação;


                    ## Body


                    O body dessa requisição é formado pelos seguintes valores:


                    ``` json

                    {
                      "cpf": "99999999999",
                      "instituicao": "Nossa fintech",
                      "bankCode": "033",
                      "accountType": "corrente",
                      "accountNumber": "123456",
                      "accountDigit": "7",
                      "branchNumber": "0001"
                      //"pixKeyType": "phone",
                      //"pixKey": "+5511999999999"
                    }

                     ```

                    ### Atenção:


                    - `cpf` e `instituicao` são obrigatórios, e o campo
                    `instituicao` deverá conter o mesmo valor utilizado na rota
                    de simulação na qual foi gerado o `financialId`.
                        
                    - Nesse body, o usuário pode enviar as informações bancárias
                    ou as informações do pix do cliente, mas atenção, só poderá
                    enviar **um ou outro!** Ou seja, se tiver os valores
                    `pixKeyType` e `pixKey`, não poderá conter `bankCode`,
                    `accountType`... Caso contrário, retornará `erro 400`.
                        

                    ## Valores possíveis para cada atributo do body


                    Alguns elementos do body só aceitam alguns valores
                    específicos, são eles:


                    | Tipo do valor | Valores permitidos |

                    | --- | --- |

                    | accountType | corrente, poupanca, pagamento |

                    | pixKeyType | chave_aleatoria, email, telefone, cpf |


                    **Atenção:** O valor `pagamento` em `accountType` somente
                    está disponível para requests onde a `instituicao` é `Nossa
                    fintech`, se tentar usar esse valor em uma request onde a
                    `instituicao` for `VCTex` retornará `erro 400`.


                    ## Retorno


                    Caso a request seja feita da forma correta, deverá retornar
                    o seguinte body:


                    ``` json

                    {
                       "msg": "Proposta criada com sucesso e já armazenada no banco de dados."
                    }

                     ```
