              description: >-
                ## Sobre o end-point


                Esse end-point recebe todas as consultas CLT que vem da
                automação em python, e deve ser utilziada apenas por ela.


                ## Headers


                Para a requisição funcionar, deverá ser enviado o seguinte
                header:


                | **Header** | **Valor** |

                | --- | --- |

                | apikey | apikey configurada no .env do nodeJS e do python |


