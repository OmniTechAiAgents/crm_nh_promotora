              - url: "{{baseURL}}/propostas/FGTS"
                name: Recuperar propostas com paginador
                meta:
                  id: req_8805553e1d304442885e00e59c563d61
                  created: 1782742681246
                  modified: 1782829082496
                  isPrivate: false
                  description: >-
                    ## Regras de negócio


                    Essa URL ded paginação tem uma regra de negócio específica,
                    caso o usuário tiver a role `promotor` no sistema, os
                    resultados obtidos pela request nessa rota serão referentes
                    apenas às consultas do mesmo, caso a role do usuário for
                    `admin`, irá retornar todas as consultas sem excessão.


                    ## URL query params


                    Essa e outras rotas de consultas não recebem body, apenas
                    `query params`, são eles:


                    | **Query param** | **Valor** |

                    | --- | --- |

                    | pesquisa | Busca por CPF |

                    | limite | Limite de propostas retornadas |

                    | pagina | Página em que a requisição se encontra (utilizada
                    no front principalmente) |


                    Se a request for feita corretamente, será retornado algo
                    parecido com isso:


                    ``` json

                    {
                        "data": [
                            {
                                "id": 1,
                                "nome": "TESTE DA SILVA",
                                "cpf": "99999999999",
                                "cel": "99999999999",
                                "data_nascimento": "1982-09-08T00:00:00.000Z",
                                "proposal_id": "UUID4",
                                "link_form": "https://id.unico.io/process/UUID4",
                                "valor_liquido": "507.19",
                                "valor_seguro": "0.00",
                                "valor_emissao": "619.00",
                                "contrato": "https://storage.googleapis.com/live-doc-api/documents/UUID4.pdf",
                                "numero_contrato": "0320343213/CCD",
                                "usuario_id": 2,
                                "usuario": "florindo2",
                                "banco": "qi",
                                "status_proposta": "Criado",
                                "msg_status": "waiting_signature",
                                "verificar": true,
                                "data_status": null,
                                "API": "Nossa fintech",
                                "createdAt": "2026-02-11T13:09:27.000Z",
                                "updatedAt": "2026-02-11T13:09:27.000Z",
                                "usuario": {
                                    "id": 2,
                                    "username": "TESTE",
                                    "role": "promotor",
                                    "createdAt": "2026-02-11T17:34:28.000Z",
                                    "updatedAt": "2026-02-11T17:34:28.000Z"
                                }
                            }
                        ],
                        "totalPages": 1
                    }

                     ```

                    ### Obs:


                    - O campo `API` é onde fica a API bancária que foi feita a
                    proposta, exemplo: `VCTex`, `Nossa fintech`, `Parana`...
                    Esse valor por ser usado para o front-end selecionar as
                    propostas com mais precisão.
                        
                    - A chave "data" é uma `array`, o que significa que pode
                    retornar vários objetos, nesse json acima foi apenas um
                    exemplo onde retornava só um.
