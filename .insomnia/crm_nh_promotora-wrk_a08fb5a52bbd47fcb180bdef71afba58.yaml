                                "valor_tac": "66.20",
                                "valor_seguro": null,
                                "tabela": "Tabela Nossa Melhor",
                                "usuario_id": 2,
                                "usuario": "florindo2",
                                "chave": "UUID4",
                                "banco": "Singulare",
                                "mensagem": "Consulta realizada com sucesso!",
                                "elegivelProposta": true,
                                "createdAt": "2026-01-30T18:37:33.000Z",
                                "updatedAt": "2026-01-30T18:37:33.000Z",
