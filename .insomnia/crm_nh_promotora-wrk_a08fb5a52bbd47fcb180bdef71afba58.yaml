                    "nome": "teste da silva",
                    "data_nasc": "2000-01-01",
                    "celular": "99999999999"
                }

                 ```

                ## Retorno


                Se tudo estiver correto, ele retornará `código 201 (created)` e
                o seguinte body:


                ``` json

                {
