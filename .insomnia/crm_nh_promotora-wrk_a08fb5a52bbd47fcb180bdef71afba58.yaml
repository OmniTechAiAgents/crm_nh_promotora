          - url: "{{baseURL}}/auth/registro"
            name: Registro
            meta:
              id: req_cf20a68ca3ec45f8b8e148322f965472
              created: 1782742681221
              modified: 1782826955963
              isPrivate: false
              description: >-
                ## Sobre o end-point


                Esse end-point serve para criar novas contas de acesso a essa
                API, portanto só poderá ser consumido por um usuário que esteja
                enviando um token de uma conta com role `admin` no header da
                requisição.


                ## Body


                Esse end-point recebe obrigatoriamente o seguinte body:


                ``` json

                {
                    "username": "NOME_DO_USUARIO",
                    "password": "SENHA_DO_USUARIO",
                    // "role": "admin"
                }

                 ```

                ### Atenção:


                - O campo `username` é um valor `unique` no banco de dados,
                portanto deverá ser obrigatoriamente único, caso contrário
                retornará `erro 409 (conflict).`
                    
                - O campo `role` é opcional, e caso não for fornecido terá o
                valor padrão `"promotor"`. O campo role pode conter apenas 2
                valores até agora, são eles:
                    

                | **Role** | **Permissões** |

                | --- | --- |

                | admin | Usuário com todas as permissões da API, inclusive de
                criar e deletar contas. |

                | promotor | Usuário padrão, com permissão de acesso a todas as
                funções de FGTS e CLT da API. |
              sortKey: -1782742669807
            method: POST
            body:
              mimeType: application/json
              text: |-
                {
                    "username": "{% faker 'randomUserName' %}",
                    "password": "{% faker 'randomPassword' %}",
                    "role": "admin || promotor"
                }
            headers:
              - name: Content-Type
                value: application/json
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{baseURL}}/auth/login"
            name: Login
            meta:
              id: req_9e5fc466e9ca46e580114736e21c766b
              created: 1782742681223
              modified: 1782826984153
              isPrivate: false
              description: >-
                ## Sobre o end-point


                Esse é um end-point de acesso a API, então não é necessário um
                token no header da requisição.


                ## Body


                Esse end-point recebe obrigatoriamente o seguinte body:


                ``` json

                {
                    "username": "SEU_NOME_DE_USUARIO",
                    "password": "SUA_SENHA"
                }

                 ```

                ## Retorno


                Após um login bem sucedido, será retornado o seguinte body:


                ``` json

                {
                    "token": "SEU_TOKEN_DE_ACESSO",
                    "user": {
                        "id": 999,
                        "name": "SEU_NOME_DE_USUARIO",
                        "roles": [
                            "SUA_ROLE"
                        ],
                        "permissions": [
                            "ROLE_1",
                            "ROLE_2",
                            "ROLE_3"
                        ]
                    }
                }

                 ```

                - O campo `token` deverá ser incluído como Bearer Token em todas
                as próximas requisições, sendo utilizado como uma "chave de
                acesso".
                    
                - O campo `role` e `permissions` são utilizados apenas como
                "mapas" para o front-end saber o que pode acessar ou não na API,
                não possui lógica interna em server-side.
              sortKey: -1782742669806
            method: POST
            body:
              mimeType: application/json
              text: |-
                {
                    "username": "{% faker 'randomUserName' %}",
                    "password": "{% faker 'randomPassword' %}"
                }
            headers:
              - name: Content-Type
                value: application/json
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
