              - url: "{{baseURL}}/consultas/CLT/consultarVinculosMargemTabela"
                name: Consultar vinculo margem e tabelas
                meta:
                  id: req_604278570e464af89236f07443611f84
                  created: 1782742681240
                  modified: 1782828578630
                  isPrivate: false
                  description: >-
                    ## Sobre o end-point


                    Esse end-point automatiza a request para outros 3 end-points
                    das APIs parceiras de operações CLT, portanto o tempo normal
                    de demora dele é de 15s - 30s.


                    ## Body


                    O body dessa requisição deverá ser montado obrigatoriamente
                    dessa seguinte forma:


                    ``` json

                    {
                      "cpf": "CPF_CLIENTE",
                      "instituicao": "Instituição desejada"
                    }

                     ```

                    No valor `"instituicao"`, aceitamos os seguintes valores:


                    | **valor** | **situação** |

                    | --- | --- |

                    | Presenca bank | Funcional |

                    | v8 | Funcional |


                    ## Resposta


                    O body de resposta muda um pouco a deepender da API que está
                    sendo utlizada para fazera operação, caso for a API do
                    `presenca bank`, retornará o seguinte body com código 200:


                    ``` json

                    [
                        {
                            "cpf": "CPF_CLIENTE",
                            "cnpjEmpregador": "CNPJ_EMPREGADOR",
                            "matricula": "NUMERO_MATRICUL_CLIENTE",
                            "dataAdmissao": "DATA_ADMISSAO_CLIENTE",
                            "valorMargemAvaliavel": 424.52,
                            "valorBaseMargem": 6162.83,
                            "valorTotalVencimentos": 66026.19,
