#comentario só para refazer o deploy
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      # http
      - "80:80"
      # https
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - node
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # liberando a porta 3306 somente no ambiente local
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  node:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_app
    restart: always
    volumes:
      - shared_uploads:/app/csvs_consulta_lote
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network
  
  frontend:
    build: ./frontend
    container_name: react_app
    restart: always
    volumes:
      - /app/node_modules
    depends_on:
      - node
    networks:
      - app_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  python_ms:
    build: ./python_ms
    container_name: python_ms
    restart: always
    volumes:
      - shared_uploads:/app/csvs_consulta_lote
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

volumes:
  mysql_data:
  rabbitmq_data:
  shared_uploads: 

networks:
  app_network:
    driver: bridge