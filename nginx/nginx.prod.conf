events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolver para Docker DNS - permite resolução dinâmica
    resolver 127.0.0.11:53 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name newsale.tech www.newsale.tech;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name newsale.tech www.newsale.tech;

        ssl_certificate /etc/letsencrypt/live/newsale.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/newsale.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://frontend:5173;

            proxy_next_upstream error timeout invalid_header http_502 http_503;
            proxy_next_upstream_tries 10;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://node:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # gambiarra para aumentar o timeout
            proxy_connect_timeout       86400s;
            proxy_send_timeout          86400s;
            proxy_read_timeout          86400s;
            send_timeout                86400s;
        }
    }
}
